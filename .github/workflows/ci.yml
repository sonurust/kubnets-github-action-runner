name: CI on Self-Hosted K8s Runner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: k8s-runner   # ← This matches the runnerScaleSetName

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "🏃 Running on self-hosted K8s runner!"
          echo "Hostname: $(hostname)"
          echo "OS: $(uname -a)"
          echo "Working dir: $(pwd)"

      - name: List files
        run: ls -la

      - name: Run test
        run: echo "✅ All tests passed on K8s runner!"
